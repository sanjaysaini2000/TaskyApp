<section class="pager">
  <p>{{ totalCount }} tasks</p>
  <div class="controls">
    <button type="button" [disabled]="page <= 1" (click)="prev()">Previous</button>
    <span>Page {{ page }} / {{ totalPages }}</span>
    <button type="button" [disabled]="page >= totalPages" (click)="next()">Next</button>
  </div>
</section>
