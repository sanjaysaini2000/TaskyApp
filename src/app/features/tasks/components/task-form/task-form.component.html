<form [formGroup]="form" (ngSubmit)="onSubmit()" class="task-form">
  <label><span>Title</span><input type="text" formControlName="title" maxlength="200" placeholder="Task title" /></label>
  <label><span>Description</span><textarea formControlName="description" rows="3" maxlength="2000" placeholder="Optional details"></textarea></label>

  <div class="split">
    <label><span>Due date</span><input type="datetime-local" formControlName="dueDate" /></label>
    <label>
      <span>Priority</span>
      <select formControlName="priority">
        <option [value]="0">Low</option><option [value]="1">Medium</option><option [value]="2">High</option>
      </select>
    </label>
  </div>

  @if (mode === 'edit') {
    <label class="checkbox-line"><input type="checkbox" formControlName="isCompleted" /><span>Completed</span></label>
  }

  @if (form.controls.title.invalid && form.controls.title.touched) {
    <p class="error">Title is required and must be under 200 characters.</p>
  }

  <button type="submit" [disabled]="saving">{{ mode === 'create' ? 'Create Task' : 'Save Changes' }}</button>
</form>
